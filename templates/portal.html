{% block scripts %}
    <!-- Global Error Resiliency & Crash Recovery Console -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            console.error("GLOBAL CLIENT CRASH CAPTURED:", message, "at", source, ":", lineno);
            showErrorRecoveryBanner(message + " (at " + (source ? source.split('/').pop() : 'unknown') + ":" + lineno + ")");
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            console.error("UNHANDLED REJECTION CAPTURED:", event.reason);
            showErrorRecoveryBanner(String(event.reason || 'Unhandled Promise Rejection'));
        });

        function showErrorRecoveryBanner(errMessage) {
            let container = document.getElementById('error-recovery-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'error-recovery-container';
                container.className = 'fixed inset-x-0 top-0 z-50 p-4 bg-red-650 text-white flex items-center justify-between shadow-xl font-sans text-xs animate-slide-down';
                container.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-800 flex items-center justify-center text-sm shrink-0">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                        <div>
                            <span class="font-extrabold uppercase bg-red-900 px-1.5 py-0.5 rounded mr-2 text-[9px]">Client Error</span>
                            <span class="font-semibold text-red-100" id="error-msg-span"></span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="clearAppCache()" class="px-3 py-1.5 bg-red-800 hover:bg-red-900 border border-red-700 rounded-lg font-bold transition-all">Clear Cache & Reload</button>
                        <button onclick="document.getElementById('error-recovery-container').remove()" class="px-2 py-1.5 hover:bg-red-700/50 rounded-lg transition-all"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                `;
                document.body.appendChild(container);
                
                // Add styling for slide-down
                const style = document.createElement('style');
                style.textContent = `
                    @keyframes slideDown {
                        from { transform: translateY(-100%); }
                        to { transform: translateY(0); }
                    }
                    .animate-slide-down {
                        animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                    }
                `;
                document.head.appendChild(style);
            }
            document.getElementById('error-msg-span').textContent = errMessage;
        }
        
        window.clearAppCache = function() {
            try {
                localStorage.clear();
                sessionStorage.clear();
                // Clear remember_token cookie
                document.cookie = "remember_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                location.reload();
            } catch (e) {
                location.reload();
            }
        };
    </script>

    <!-- React App Script -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const getCookie = (name) => {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        };

        // Safe Storage helpers for sandboxed environments
        const safeGet = (key) => {
            try {
                const val = localStorage.getItem(key) || sessionStorage.getItem(key);
                if (val) return val;
            } catch (e) {}
            if (key === 'universe_jwt_token') {
                const tokenCookie = getCookie('remember_token');
                if (tokenCookie) return tokenCookie;
            }
            if (window.__storage_fallback) {
                return window.__storage_fallback[key] || null;
            }
            return null;
        };

        const safeSet = (key, val, persist = false) => {
            try {
                const storage = persist ? localStorage : sessionStorage;
                storage.setItem(key, val);
            } catch (e) {
                if (!window.__storage_fallback) window.__storage_fallback = {};
                window.__storage_fallback[key] = val;
            }
        };

        const safeRemove = (key) => {
            try {
                localStorage.removeItem(key);
                sessionStorage.removeItem(key);
            } catch (e) {}
            if (window.__storage_fallback) {
                delete window.__storage_fallback[key];
            }
        };

        // Monkey-patch fetch to automatically append CSRF token and handle JWT refreshes
        const originalFetch = window.fetch;
        window.fetch = async function(url, options = {}) {
            const method = (options.method || 'GET').toUpperCase();
            options.headers = options.headers || {};
            
            // Auto inject JWT token from safe storage
            const tokenVal = safeGet('universe_jwt_token');
            if (tokenVal) {
                if (options.headers instanceof Headers) {
                    if (!options.headers.has('Authorization')) {
                        options.headers.set('Authorization', `Bearer ${tokenVal}`);
                    }
                } else {
                    if (!options.headers['Authorization']) {
                        options.headers['Authorization'] = `Bearer ${tokenVal}`;
                    }
                }
            }

            if (['POST', 'PUT', 'DELETE'].includes(method)) {
                const getCookieLocal = (name) => {
                    const value = "; " + document.cookie;
                    const parts = value.split("; " + name + "=");
                    if (parts.length === 2) return parts.pop().split(";").shift();
                    return "";
                };
                const csrfTokenVal = getCookieLocal('csrf_token');
                if (csrfTokenVal) {
                    if (options.headers instanceof Headers) {
                        options.headers.set('X-CSRF-Token', csrfTokenVal);
                    } else {
                        options.headers['X-CSRF-Token'] = csrfTokenVal;
                    }
                }
            }

            let response = await originalFetch(url, options);

            // Handle 401 token refresh rotation
            if (response.status === 401 && !url.includes('/api/refresh') && !url.includes('/api/login') && !url.includes('/api/register')) {
                try {
                    const refreshResp = await originalFetch('/api/refresh', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    if (refreshResp.ok) {
                        const refreshResult = await refreshResp.json();
                        if (refreshResult.success && refreshResult.token) {
                            safeSet('universe_jwt_token', refreshResult.token, true);
                            // Retry request with new token
                            if (options.headers instanceof Headers) {
                                options.headers.set('Authorization', `Bearer ${refreshResult.token}`);
                            } else {
                                options.headers['Authorization'] = `Bearer ${refreshResult.token}`;
                            }
                            response = await originalFetch(url, options);
                        } else {
                            safeRemove('universe_jwt_token');
                            safeRemove('pu_student_user');
                            window.location.href = '/';
                        }
                    } else {
                        safeRemove('universe_jwt_token');
                        safeRemove('pu_student_user');
                        window.location.href = '/';
                    }
                } catch (err) {
                    console.error('Fetch refresh failed:', err);
                }
            }
            return response;
        };

        function AnimatedNumber({ value }) {
            const [displayVal, setDisplayVal] = useState('');
            
            useEffect(() => {
                const stringVal = String(value || '');
                const numMatch = stringVal.match(/[\d.]+/);
                if (!numMatch) {
                    setDisplayVal(stringVal);
                    return;
                }
                const target = parseFloat(numMatch[0]);
                const suffix = stringVal.replace(numMatch[0], '');
                
                let start = 0;
                const duration = 600; // ms
                const stepTime = 16;
                const totalSteps = duration / stepTime;
                const increment = target / totalSteps;
                
                let currentStep = 0;
                const timer = setInterval(() => {
                    currentStep++;
                    start += increment;
                    if (currentStep >= totalSteps) {
                        clearInterval(timer);
                        setDisplayVal(stringVal);
                    } else {
                        const formatted = Number.isInteger(target) ? Math.floor(start) : start.toFixed(1);
                        setDisplayVal(`${formatted}${suffix}`);
                    }
                }, stepTime);
                
                return () => clearInterval(timer);
            }, [value]);

            return <span>{displayVal}</span>;
        }

        function Sparkline({ data, color = '#E4002B' }) {
            if (!data || data.length === 0) return null;
            const width = 100;
            const height = 30;
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            
            const points = data.map((val, idx) => {
                const x = (idx / (data.length - 1)) * width;
                const y = height - 4 - ((val - min) / range) * (height - 8);
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            });
            
            const d = `M ${points.join(' L ')}`;
            const areaD = `${d} L ${width},${height} L 0,${height} Z`;
            
            return (
                <svg width={width} height={height} class="overflow-visible select-none">
                    <defs>
                        <linearGradient id="sparkline-grad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={color} stopOpacity="0.2" />
                            <stop offset="100%" stopColor={color} stopOpacity="0" />
                        </linearGradient>
                    </defs>
                    <path d={areaD} fill="url(#sparkline-grad)" />
                    <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        }

                    }

                loadMessages();
            }, [activeSessionId]);

            const handleCreateSession = async () => {
                try {
                    const response = await fetch('/api/chat-sessions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            university_id: selectedUniversityId,
                            title: 'New Chat'
                        })
                    });
                    const data = await response.json();
                    if (data.success) {
                        setChatSessions(prev => [data.session, ...prev]);
                        setActiveSessionId(data.session.id);
                        setChatMessages([]);
                        showToastAlert('Started new chat session.', 'success');
                    }
                } catch (err) {
                    showToastAlert('Failed to create new session.', 'error');
                }
            };

            const handleRenameSession = async (sessId) => {
                if (!editingSessionTitle.trim()) return;
                try {
                    const response = await fetch(`/api/chat-sessions/${sessId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ title: editingSessionTitle.trim() })
                    });
                    const data = await response.json();
                    if (data.success) {
                        setChatSessions(prev => prev.map(s => s.id === sessId ? data.session : s));
                        setEditingSessionId(null);
                        setEditingSessionTitle('');
                        showToastAlert('Chat session renamed.', 'success');
                    }
                } catch (err) {
                    showToastAlert('Failed to rename session.', 'error');
                }
            };

            const handleDeleteSession = async (sessId, e) => {
                if (e) e.stopPropagation();
                if (!confirm('Are you sure you want to delete this chat session?')) return;
                try {
                    const response = await fetch(`/api/chat-sessions/${sessId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await response.json();
                    if (data.success) {
                        setChatSessions(prev => prev.filter(s => s.id !== sessId));
                        if (activeSessionId === sessId) {
                            setActiveSessionId(null);
                            setChatMessages([]);
                        }
                        showToastAlert('Chat session deleted.', 'success');
                    }
                } catch (err) {
                    showToastAlert('Failed to delete session.', 'error');
                }
            };

            // Stream Chat Actions
            const handleSendMessage = async (customPrompt = '') => {
                const text = (customPrompt || chatInput).trim();
                if (!text && !attachedFileContext) return;
                setChatInput('');
                addRecentSearch(text);

                let currentSessionId = activeSessionId;
                if (!currentSessionId) {
                    try {
                        const res = await fetch('/api/chat-sessions', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                university_id: selectedUniversityId,
                                title: text ? text.substring(0, 30) : 'New Chat'
                            })
                        });
                        const data = await res.json();
                        if (data.success) {
                            currentSessionId = data.session.id;
                            setActiveSessionId(currentSessionId);
                            setChatSessions(prev => [data.session, ...prev]);
                        } else {
                            showToastAlert('Failed to initialize session.', 'error');
                            return;
                        }
                    } catch (err) {
                        showToastAlert('Failed to start chat session.', 'error');
                        return;
                    }
                }

                let fullMessageText = text;
                if (attachedFileContext) {
                    fullMessageText = `[Attached File: ${attachedFileName}]\n${attachedFileContext}\n\nUser Question:\n${text}`;
                    setAttachedFileContext('');
                    setAttachedFileName('');
                }

                const userMsg = { sender: 'user', message: fullMessageText, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                const updated = [...chatMessages, userMsg];
                setChatMessages(updated);
                setIsTyping(true);

                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    setSpeakingIndex(null);
                }

                let botMsg = { sender: 'bot', message: '', timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                setChatMessages(prev => [...prev, botMsg]);

                const url = `/api/chat/stream?token=${encodeURIComponent(token)}&session_id=${currentSessionId}&message=${encodeURIComponent(fullMessageText)}&university_id=${selectedUniversityId}&mode=${copilotMode ? 'copilot' : ''}`;
                const source = new EventSource(url);

                source.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.text) {
                            setIsTyping(false);
                            botMsg.message += data.text;
                            setChatMessages(prev => {
                                const copy = [...prev];
                                copy[copy.length - 1] = { ...botMsg };
                                return copy;
                            });
                        } else if (data.error) {
                            botMsg.message = `Error: ${data.error}`;
                            setChatMessages(prev => {
                                const copy = [...prev];
                                copy[copy.length - 1] = { ...botMsg };
                                return copy;
                            });
                            source.close();
                            setIsTyping(false);
                        }
                    } catch (e) {
                        console.error(e);
                    }
                };

                source.onerror = () => {
                    source.close();
                    setIsTyping(false);
                    loadChatSessions();
                };
            };

            const downloadChatMarkdown = () => {
                if (chatMessages.length === 0) {
                    showToastAlert('No messages to export.', 'error');
                    return;
                }
                let content = `# Conversation Log - ${activeUniversityData?.university_name || 'UniVerse'}\n\n`;
                chatMessages.forEach(msg => {
                    content += `### **${msg.sender === 'user' ? 'Student' : 'UniVerse Assistant'}** (${msg.timestamp})\n${msg.message}\n\n---\n\n`;
                });
                const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${selectedUniversityId}_chat_logs.md`;
                link.click();
                showToastAlert('Chat exported as Markdown!', 'success');
            };

            const exportChatAsPDF = () => {
                if (chatMessages.length === 0) {
                    showToastAlert('No messages to export.', 'error');
                    return;
                }
                const printWindow = window.open('', '_blank');
                let html = `
                    <html>
                    <head>
                        <title>UniVerse AI Conversation log</title>
                        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
                        <style>
                            body { font-family: 'Inter', sans-serif; padding: 40px; color: #1e293b; max-width: 800px; margin: 0 auto; line-height: 1.6; }
                            h1 { font-size: 24px; font-weight: 800; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 24px; color: #0f172a; }
                            .msg { margin-bottom: 24px; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; }
                            .msg-user { border-left: 4px solid #E4002B; }
                            .msg-bot { border-left: 4px solid #0284c7; }
                            .sender { font-weight: 700; font-size: 12px; text-transform: uppercase; tracking-wider; margin-bottom: 6px; }
                            .sender-user { color: #E4002B; }
                            .sender-bot { color: #0284c7; }
                            .time { font-size: 10px; color: #94a3b8; margin-left: 8px; font-weight: 400; }
                            .content { font-size: 13px; }
                            table { width: 100%; border-collapse: collapse; margin: 12px 0; }
                            th, td { border: 1px solid #cbd5e1; padding: 8px 12px; font-size: 12px; text-align: left; }
                            th { background: #f1f5f9; }
                            pre { background: #0f172a; color: #f8fafc; padding: 12px; border-radius: 6px; font-size: 11px; overflow-x: auto; }
                        </style>
                    </head>
                    <body>
                        <h1>UniVerse AI Conversation log</h1>
                        <p style="font-size: 12px; color: #64748b; margin-bottom: 30px;">
                            <strong>University Context:</strong> ${activeUniversityData?.university_name || 'UniVerse'}<br>
                            <strong>Generated on:</strong> ${new Date().toLocaleString()}
                        </p>
                `;
                chatMessages.forEach(msg => {
                    const markedContent = marked.parse(msg.message);
                    html += `
                        <div class="msg msg-${msg.sender}">
                            <div class="sender sender-${msg.sender}">
                                ${msg.sender === 'user' ? 'Student' : 'UniVerse Assistant'}
                                <span class="time">${msg.timestamp}</span>
                            </div>
                            <div class="content">${markedContent}</div>
                        </div>
                    `;
                });
                html += `
                        \x3cscript\x3e
                            window.onload = function() {
                                window.print();
                                setTimeout(function() { window.close(); }, 500);
                            };
                        ` + `<\/script>` + `
                    </body>
                    </html>
                `;
                printWindow.document.write(html);
                printWindow.document.close();
                showToastAlert('PDF print window opened!', 'success');
            };

            const exportChatAsTXT = () => {
                if (chatMessages.length === 0) {
                    showToastAlert('No messages to export.', 'error');
                    return;
                }
                let content = `CONVERSATION LOG - ${activeUniversityData?.university_name || 'UNIVERSE'}\n`;
                content += `Generated on: ${new Date().toLocaleString()}\n`;
                content += `==================================================\n\n`;
                chatMessages.forEach(msg => {
                    const senderLabel = msg.sender === 'user' ? 'Student' : 'UniVerse Assistant';
                    content += `[${msg.timestamp}] ${senderLabel}:\n`;
                    content += `${msg.message}\n`;
                    content += `--------------------------------------------------\n\n`;
                });
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${selectedUniversityId}_chat_logs.txt`;
                link.click();
                showToastAlert('Chat exported as TXT!', 'success');
            };

            // Recommendation Form Submit
            const handleRecommendationSubmit = async (e) => {
                e.preventDefault();
                setRecLoading(true);
                try {
                    const response = await fetch('/api/recommend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            budget: recBudget,
                            location: recLocation,
                            branch: recBranch,
                            interest: recInterest,
                            rank: recRank
                        })
                    });
                    const list = await response.json();
                    setRecommendationsList(list);
                    if (list.length === 0) {
                        showToastAlert('No matches found. Try relaxing your filters.', 'error');
                    } else {
                        showToastAlert(`Found ${list.length} course recommendations!`, 'success');
                    }
                } catch (err) {
                    showToastAlert('Failed to generate course recommendations.', 'error');
                } finally {
                    setRecLoading(false);
                }
            };

            // College Predictor Form Submit
            const handlePredictorSubmit = async (e) => {
                e.preventDefault();
                setPredLoading(true);
                try {
                    const response = await fetch('/api/predict-colleges', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            rank: predRank,
                            category: predCategory,
                            home_state: predState
                        })
                    });
                    const list = await response.json();
                    setPredictedColleges(list);
                    if (list.length === 0) {
                        showToastAlert('No colleges found for this rank cutoff range.', 'error');
                    } else {
                        showToastAlert(`Predicted ${list.length} potential colleges!`, 'success');
                    }
                } catch (err) {
                    showToastAlert('Failed to run college prediction.', 'error');
                } finally {
                    setPredLoading(false);
                }
            };

            // Scholarship Finder Form Submit
            const handleScholarshipsSubmit = async (e) => {
                e.preventDefault();
                setScholLoading(true);
                try {

                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`

                        body: JSON.stringify({
                            income: scholIncome,
                            marks: scholMarks,
                            category: scholCategory,
                            state: scholState,
                            course: scholCourse

                    });
                    if (response.ok) {
                        const result = await response.json();
                        setScholarshipsList(result.scholarships || []);
                        setScholAiGuidance(result.ai_guidance || '');
                        if (!result.scholarships || result.scholarships.length === 0) {
                            showToastAlert('No matching scholarships found.', 'error');
                        } else {
                            showToastAlert(`Found ${result.scholarships.length} matching scholarships!`, 'success');
                        }
                    } else {
                        showToastAlert('Failed to search scholarships.', 'error');
                    }
                } catch (err) {
                    showToastAlert('Failed to search scholarships.', 'error');
                } finally {
                    setScholLoading(false);
                }
            };

            // Settings Save API Key
            const saveApiKey = async () => {
                if (!apiKeyInput.trim()) {
                    showToastAlert('API key cannot be empty.', 'error');
                    return;
                }
                try {
                    const response = await fetch('/api/key', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ api_key: apiKeyInput })
                    });
                    if (response.ok) {
                        showToastAlert('Gemini Generative API Key updated!', 'success');
                        setHasApiKey(true);
                    } else {
                        showToastAlert('Failed to update API Key.', 'error');
                    }
                } catch (err) {
                    showToastAlert('Connection error saving configurations.', 'error');
                }
            };

            // Render Markdown
            const parseMarkdown = (text) => {
                try {
                    return { __html: marked.parse(text) };
                } catch (e) {
                    return { __html: text };
                }
            };

            return (
                <div class="h-full flex overflow-hidden bg-slate-50 dark:bg-slate-950 font-sans">
                    
                    {/* Mobile Sidebar Overlay */}
                    {mobileSidebarOpen && (
                        <div class="fixed inset-0 z-40 md:hidden bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={() => setMobileSidebarOpen(false)}></div>
                    )}

                    {/* Sidebar navigation */}
                    <aside id="portal-sidebar" class={`fixed md:relative inset-y-0 left-0 z-50 flex flex-col w-64 bg-slate-900 border-r border-slate-800 text-slate-300 transition-transform duration-300 transform md:translate-x-0 ${mobileSidebarOpen ? 'translate-x-0' : '-translate-x-0 hidden md:flex'}`}>
                        {/* Logo header */}
                        <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-800 bg-slate-900/50">
                            <div class="w-8 h-8 rounded-lg bg-danger-custom text-white flex items-center justify-content-center font-bold font-outfit text-xl shadow-lg shadow-danger-custom/30">
                                U
                            </div>
                            <div class="flex flex-col">
                                <span class="font-outfit font-extrabold text-white text-lg tracking-wider">UNIVERSE AI</span>
                                <span class="text-[9px] text-slate-500 uppercase tracking-widest font-semibold">Student Portal</span>
                            </div>
                        </div>

                        {/* Navigation menus */}
                        <nav class="flex-1 px-4 py-4 overflow-y-auto custom-scrollbar space-y-1">
                            {getTabsForRole().map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => {
                                        setActiveTab(tab.id);
                                        setMobileSidebarOpen(false);
                                    }}
                                    class={`w-full flex items-center gap-3.5 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 ${
                                        activeTab === tab.id
                                            ? 'bg-danger-custom text-white shadow-lg shadow-danger-custom/20'
                                            : 'hover:bg-slate-800/60 hover:text-slate-100'
                                    }`}
                                >
                                    <i class={`fa-solid ${tab.icon} w-5 text-center`}></i>
                                    <span>{tab.label}</span>
                                    {tab.id === 'notifications' && unreadNotifsCount > 0 && (
                                        <span class="ml-auto bg-danger-custom text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shrink-0">
                                            {unreadNotifsCount}
                                        </span>
                                    )}
                                </button>

                        {/* Student User badge profile */}
                        <div class="px-5 py-4 border-t border-slate-800 bg-slate-900/40">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-content-center text-slate-100 font-bold">
                                    <i class="fa-solid fa-user-graduate"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-xs font-semibold text-white truncate">{studentUser?.fullname || 'Guest Student'}</p>

                                </div>
                                <button

                                        safeRemove('universe_jwt_token');
                                        safeRemove('pu_student_user');
                                        window.location.href = '/';
                                    }}
                                    class="text-slate-500 hover:text-danger-custom hover:bg-slate-800 p-1.5 rounded-lg transition-colors"
                                    title="Logout"
                                >

                            </div>
                        </div>
                    </aside>

                    {/* Right Viewport Content */}
                    <div class="flex-1 flex flex-col min-w-0 overflow-hidden h-full">
                        
                        {/* Header bar controls */}
                        <header class="flex items-center justify-between px-6 py-4 bg-white dark:bg-slate-900 border-b border-slate-200/80 dark:border-slate-800/80 z-30">
                            <div class="flex items-center gap-3">
                                <button onClick={() => setMobileSidebarOpen(true)} class="md:hidden p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800">
                                    <i class="fa-solid fa-bars text-lg"></i>
                                </button>
                                <span class="font-outfit font-bold text-lg text-slate-900 dark:text-slate-100 capitalize">
                                    {getTabsForRole().find(t => t.id === activeTab)?.label}
                                </span>
                            </div>
                            
                            {/* University switches context selector & Theme settings */}
                            <div class="flex items-center gap-4">
                                <div class="relative">
                                    <select 
                                        value={selectedUniversityId}

                                    <i class="fa-solid fa-chevron-down absolute right-3 top-3 text-[9px] pointer-events-none text-slate-500"></i>

                        {/* Viewport content sheets */}

                                    {/* PERSONAL DASHBOARD HOME VIEWPORT */}

                                                <h2 class="text-2xl font-extrabold font-outfit text-slate-800 dark:text-white">Welcome back, {studentUser?.fullname || 'Student'}! 👋</h2>
                                                <p class="text-sm text-slate-500 mt-1">Here is a summary of your decision tracker, admission roadmaps, and career prep workspace.</p>
                                            </div>
 
                                            {dashboardLoading || !dashboardData ? (

                                                                value={profilePrefCourse}
                                                                onChange={(e) => setProfilePrefCourse(e.target.value)}
                                                                class="w-full text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 rounded-xl focus:outline-none text-slate-800 dark:text-slate-350"
                                                            />
                                                        </div>
                                                        <button type="submit" disabled={profileLoading} class="w-full bg-danger-custom hover:bg-danger-custom-hover text-white text-xs font-bold py-2 rounded-xl transition-all shadow-md">
                                                            {profileLoading ? 'Saving...' : 'Save Profile Changes'}
                                                        </button>
                                                    </form>
                                                </div>

                                                {/* Dashboard Activity Counters and Audit Trail */}
                                                <div class="lg:col-span-2 space-y-6">
                                                    {/* Activity counters row */}
                                                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                                        <div class="p-4 border border-slate-100 dark:border-slate-800/80 rounded-2xl bg-indigo-50/5 dark:bg-indigo-950/5 text-center">
                                                            <i class="fa-solid fa-comments text-indigo-500 block mb-1 text-sm"></i>
                                                            <span class="text-sm font-bold text-slate-800 dark:text-slate-200 block">{activityHistoryData.chats_count || 0}</span>
                                                            <span class="text-[9px] text-slate-400">Total Chats</span>
                                                        </div>
                                                        <div class="p-4 border border-slate-100 dark:border-slate-800/80 rounded-2xl bg-rose-50/5 dark:bg-rose-950/5 text-center">
                                                            <i class="fa-solid fa-heart text-rose-500 block mb-1 text-sm"></i>
                                                            <span class="text-sm font-bold text-slate-800 dark:text-slate-200 block">{(activityHistoryData.bookmarks_count || 0) + (activityHistoryData.courses_count || 0)}</span>
                                                            <span class="text-[9px] text-slate-400">Bookmarks</span>
                                                        </div>
                                                        <div class="p-4 border border-slate-100 dark:border-slate-800/80 rounded-2xl bg-emerald-50/5 dark:bg-emerald-950/5 text-center">
                                                            <i class="fa-solid fa-file-circle-check text-emerald-500 block mb-1 text-sm"></i>
                                                            <span class="text-sm font-bold text-slate-800 dark:text-slate-200 block">{activityHistoryData.applications_count || 0}</span>
                                                            <span class="text-[9px] text-slate-400">Applications</span>
                                                        </div>
                                                        <div class="p-4 border border-slate-100 dark:border-slate-800/80 rounded-2xl bg-amber-50/5 dark:bg-amber-950/5 text-center">
                                                            <i class="fa-solid fa-magnifying-glass text-amber-500 block mb-1 text-sm"></i>
                                                            <span class="text-sm font-bold text-slate-800 dark:text-slate-200 block">{activityHistoryData.searches_count || 0}</span>
                                                            <span class="text-[9px] text-slate-400">Searches Run</span>
                                                        </div>
                                                    </div>

                                                    {/* Recent Searches */}
                                                    <div class="p-5 border border-slate-100 dark:border-slate-800 rounded-2xl bg-slate-50/10">
                                                        <h4 class="font-outfit font-bold text-slate-800 dark:text-slate-100 text-xs mb-3 flex items-center gap-1.5">
                                                            <i class="fa-solid fa-clock-rotate-left text-amber-500"></i> Recent Chat Queries
                                                        </h4>
                                                        {searchesData.length === 0 ? (
                                                            <p class="text-[10px] text-slate-400">No search queries run recently.</p>
                                                        ) : (
                                                            <div class="flex flex-wrap gap-1.5">
                                                                {searchesData.map(s => (
                                                                    <button 
                                                                        key={s.id} 
                                                                        onClick={() => { setChatInput(s.query); setActiveTab('chatbot'); }}
                                                                        class="text-[10px] py-1 px-3.5 bg-slate-100 dark:bg-slate-850 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-full transition-colors flex items-center gap-1"
                                                                    >
                                                                        <i class="fa-solid fa-reply-all text-[8px] opacity-60"></i> {s.query}
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Activity History Audit Trail */}
                                                    <div class="p-5 border border-slate-100 dark:border-slate-800 rounded-2xl bg-slate-50/10">
                                                        <h4 class="font-outfit font-bold text-slate-800 dark:text-slate-100 text-xs mb-3 flex items-center gap-1.5">
                                                            <i class="fa-solid fa-shoe-prints text-indigo-500"></i> Audit Activity logs
                                                        </h4>
                                                        {activityHistoryData.recent_activities?.length === 0 ? (
                                                            <p class="text-[10px] text-slate-400">No activity logged.</p>
                                                        ) : (
                                                            <div class="space-y-2">
                                                                {activityHistoryData.recent_activities.map((act, idx) => (
                                                                    <div key={idx} class="text-[10px] text-slate-600 dark:text-slate-350 border-b border-slate-100 dark:border-slate-850 pb-1.5 flex justify-between">
                                                                        <span>{act.action}</span>
                                                                        <span class="text-slate-400 text-[9px]">{act.timestamp}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* FACULTY HUB VIEWPORT */}
                                    {activeTab === 'faculty_control' && studentUser?.role === 'Faculty' && (
                                        <div class="glass-card p-6 rounded-2xl space-y-6">
                                            <div class="border-b border-slate-100 dark:border-slate-800 pb-4">
                                                <h3 class="font-outfit font-extrabold text-slate-800 dark:text-slate-100 text-lg">Faculty Control Hub</h3>
                                                <p class="text-xs text-slate-500">Publish academic alerts and manage university context information</p>
                                            </div>

                                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                                {/* Publish Announcements */}
                                                <div class="p-5 border border-slate-150 dark:border-slate-800/80 rounded-2xl bg-slate-50/30 dark:bg-slate-900/30 space-y-4">
                                                    <h4 class="font-outfit font-bold text-slate-800 dark:text-slate-100 text-xs"><i class="fa-solid fa-bullhorn text-danger-custom mr-2"></i>Publish Academic Announcement</h4>
                                                    
                                                    <form onSubmit={handlePublishAnnouncement} class="space-y-3.5">
                                                        <div class="space-y-1.5">
                                                            <label class="text-[10px] text-slate-500 font-semibold block">Notice Title</label>
                                                            <input 
                                                                type="text" 
                                                                value={newAnnTitle}
                                                                onChange={(e) => setNewAnnTitle(e.target.value)}
                                                                placeholder="e.g. End Semester Exams Schedule"
                                                                required
                                                                class="w-full text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 rounded-xl focus:outline-none"
                                                            />
                                                        </div>
                                                        <div class="space-y-1.5">
                                                            <label class="text-[10px] text-slate-500 font-semibold block">Notice Description</label>
                                                            <textarea 
                                                                value={newAnnDesc}
                                                                onChange={(e) => setNewAnnDesc(e.target.value)}
                                                                placeholder="Enter description details..."
                                                                required
                                                                rows="3"
                                                                class="w-full text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 rounded-xl focus:outline-none"
                                                            ></textarea>
                                                        </div>
                                                        <div class="space-y-1.5">
                                                            <label class="text-[10px] text-slate-550 font-semibold block">Announcement Type</label>
                                                            <select 
                                                                value={newAnnType}
                                                                onChange={(e) => setNewAnnType(e.target.value)}
                                                                class="w-full text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 rounded-xl focus:outline-none"
                                                            >
                                                                <option value="Notice">Notice</option>
                                                                <option value="Exam">Exam Alert</option>
                                                                <option value="Placement">Placement Notice</option>
                                                                <option value="Holiday">Holiday Notification</option>
                                                            </select>
                                                        </div>
                                                        <button type="submit" class="w-full bg-danger-custom hover:bg-danger-custom-hover text-white text-xs font-bold py-2 rounded-xl transition-colors shadow-sm">
                                                            Publish Announcement
                                                        </button>
                                                    </form>
                                                </div>

                                                {/* University Details Context Display */}
                                                <div class="p-5 border border-slate-150 dark:border-slate-800/80 rounded-2xl bg-slate-50/30 dark:bg-slate-900/30 space-y-4">
                                                    <h4 class="font-outfit font-bold text-slate-800 dark:text-slate-100 text-xs"><i class="fa-solid fa-graduation-cap text-indigo-500 mr-2"></i>Active University Overview</h4>
                                                    <div class="space-y-2.5 text-xs">
                                                        <div class="flex justify-between border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                            <span class="text-slate-400">University Name:</span>
                                                            <span class="font-bold text-slate-800 dark:text-slate-200">{activeUniversityData?.university_name}</span>
                                                        </div>
                                                        <div class="flex justify-between border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                            <span class="text-slate-400">NAAC Accreditation:</span>
                                                            <span class="font-semibold text-slate-800 dark:text-slate-200">{activeUniversityData?.accreditation || 'N/A'}</span>
                                                        </div>
                                                        <div class="flex justify-between border-b border-slate-100 dark:border-slate-800 pb-1.5">
                                                            <span class="text-slate-400">NIRF Ranking:</span>
                                                            <span class="font-semibold text-slate-800 dark:text-slate-200">{activeUniversityData?.ranking || 'N/A'}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* ADMIN PANEL VIEWPORT */}
                                    {activeTab === 'admin_control' && studentUser?.role === 'Admin' && (
                                        <div class="glass-card p-6 rounded-2xl space-y-6">
                                            <div class="border-b border-slate-100 dark:border-slate-800 pb-4 flex justify-between items-center">
                                                <div>
                                                    <h3 class="font-outfit font-extrabold text-slate-800 dark:text-slate-100 text-lg">System Admin Dashboard</h3>
                                                    <p class="text-xs text-slate-500">Monitor active user sessions, audit chat logs, and publish notice banners</p>
                                                </div>
                                                <div class="flex items-center gap-2">
                                                    <a 
                                                        href={`/admin?token=${encodeURIComponent(token)}`}
                                                        target="_blank"
                                                        rel="noopener noreferrer"
                                                        class="bg-indigo-650 hover:bg-indigo-600 text-white text-xs font-bold px-3.5 py-2 rounded-xl transition-all shadow-sm flex items-center gap-1.5 text-decoration-none"
                                                    >
                                                        <i class="fa-solid fa-toolbox"></i> Launch Console Panel
                                                    </a>
                                                    <button onClick={handleClearLogs} class="bg-red-500 hover:bg-red-650 text-white text-xs font-bold px-3 py-2 rounded-xl transition-all shadow-sm">
                                                        <i class="fa-solid fa-trash-can mr-1.5"></i>Clear Audit Logs
                                                    </button>
                                                </div>
                                            </div>

                                            {/* Users Audit Table */}
                                            <div class="space-y-3">
                                                <h4 class="font-outfit font-bold text-xs text-slate-800 dark:text-slate-200"><i class="fa-solid fa-users text-indigo-500 mr-2"></i>Active Registered Users</h4>
                                                <div class="overflow-x-auto border border-slate-200/65 dark:border-slate-800 rounded-xl">
                                                    <table class="w-full text-left border-collapse text-[11px]">
                                                        <thead>
                                                            <tr class="border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60 font-bold text-slate-800 dark:text-slate-200">
                                                                <th class="py-2.5 px-4">Full Name</th>
                                                                <th class="py-2.5 px-4">Email</th>
                                                                <th class="py-2.5 px-4">Enrollment ID</th>
                                                                <th class="py-2.5 px-4">Role</th>
                                                                <th class="py-2.5 px-4">Acc. Status</th>
                                                                <th class="py-2.5 px-4 text-right">Actions</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody class="divide-y divide-slate-100 dark:divide-slate-850">
                                                            {systemUsers.map((u, idx) => (
                                                                <tr key={idx} class="hover:bg-slate-50/50 dark:hover:bg-slate-900/30">
                                                                    <td class="py-2.5 px-4 font-semibold text-slate-850 dark:text-slate-200">{u.fullname}</td>
                                                                    <td class="py-2.5 px-4 text-slate-600 dark:text-slate-400">{u.email}</td>
                                                                    <td class="py-2.5 px-4 font-mono">{u.enrollment_id}</td>
                                                                    <td class="py-2.5 px-4">
                                                                        <span class={`px-2 py-0.5 rounded text-[9px] font-extrabold uppercase ${
                                                                            u.role === 'Admin' ? 'bg-red-500/10 text-red-500' : (u.role === 'Faculty' ? 'bg-amber-500/10 text-amber-500' : 'bg-indigo-500/10 text-indigo-500')
                                                                        }`}>{u.role || 'Student'}</span>
                                                                    </td>
                                                                    <td class="py-2.5 px-4">
                                                                        <span class="text-emerald-500 font-bold">Active</span>
                                                                    </td>
                                                                    <td class="py-2.5 px-4 text-right">
                                                                        <button onClick={() => handleDeleteUser(idx)} class="text-red-500 hover:text-red-655 p-1 font-bold text-[10px]">Suspend</button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                            {/* Chat Audit Log Registry */}
                                            <div class="space-y-3 pt-4 border-t border-slate-150 dark:border-slate-800">
                                                <h4 class="font-outfit font-bold text-xs text-slate-800 dark:text-slate-200"><i class="fa-solid fa-clock-rotate-left text-sky-500 mr-2"></i>Audit Log Registry (Queries Monitor)</h4>
                                                <div class="overflow-x-auto border border-slate-200/65 dark:border-slate-800 rounded-xl">
                                                    <table class="w-full text-left border-collapse text-[11px]">
                                                        <thead>
                                                            <tr class="border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60 font-bold text-slate-800 dark:text-slate-200">
                                                                <th class="py-2.5 px-4">Timestamp</th>
                                                                <th class="py-2.5 px-4">User</th>
                                                                <th class="py-2.5 px-4">Query Details</th>
                                                                <th class="py-2.5 px-4">Engine</th>
                                                                <th class="py-2.5 px-4">Latency</th>
                                                                <th class="py-2.5 px-4">Status</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody class="divide-y divide-slate-100 dark:divide-slate-850">
                                                            {chatLogs.map((log, idx) => (
                                                                <tr key={idx} class="hover:bg-slate-50/50 dark:hover:bg-slate-900/30">
                                                                    <td class="py-2.5 px-4 text-slate-550 dark:text-slate-400 font-mono">{log.timestamp}</td>
                                                                    <td class="py-2.5 px-4 font-semibold">{log.user || 'anonymous'}</td>
                                                                    <td class="py-2.5 px-4 truncate max-w-[200px]" title={log.query}>{log.query}</td>
                                                                    <td class="py-2.5 px-4">{log.engine}</td>
                                                                    <td class="py-2.5 px-4 font-semibold">{log.latency}</td>
                                                                    <td class="py-2.5 px-4">
                                                                        <span class={`px-2 py-0.5 rounded text-[9px] font-extrabold ${log.status === 'Success' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-amber-500/10 text-amber-500'}`}>{log.status}</span>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            )}
                        </main>
                    </div>

                    {/* Alert Toast Notification */}
                    {toast.visible && (
                        <div class={`fixed bottom-6 right-6 z-50 flex items-center gap-3 px-5 py-3 rounded-2xl border text-xs font-semibold shadow-lg animate-slide-up ${
                            toast.type === 'success' 
                                ? 'bg-emerald-50 dark:bg-slate-900 border-emerald-250 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400' 
                                : 'bg-red-50 dark:bg-slate-900 border-red-250 dark:border-red-800 text-red-800 dark:text-red-400'
                        }`}>
                            <i class={`fa-solid ${toast.type === 'success' ? 'fa-circle-check text-emerald-500' : 'fa-circle-exclamation text-red-500'}`}></i>
                            <span>{toast.message}</span>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('portal-root'));
        root.render(<UniversePortalApp />);
    </script>
{% endblock %}
